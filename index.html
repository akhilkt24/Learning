<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional Digital Clock Timer Application">
    <title>Digital Clock Timer - Professional Edition</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="clock-container">
        <h1 class="app-title">Digital Clock Timer</h1>
        <div class="clock-display">
            <div id="clock" class="time-display"></div>
            <div id="date" class="date-display"></div>
        </div>
        <div class="controls">
            <button id="toggle-format" class="btn btn-primary">Toggle 12/24 Hour Format</button>
            <button id="toggle-timezone" class="btn btn-secondary">Change Timezone</button>
        </div>
        <div id="timezone-info" class="timezone-info"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
